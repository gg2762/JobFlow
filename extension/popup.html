<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap">
<style>
  :root {
    --bg-deep: #0A0E1A;
    --bg-card: #0F1729;
    --bg-elev: #131D33;
    --border: #1E293B;
    --accent: #22D3EE;
    --accent-glow: #67E8F9;
    --text: #F1F5F9;
    --text-dim: #94A3B8;
    --text-faint: #64748B;
    --ok: #34D399;
    --danger: #F87171;
    --warn: #FBBF24;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; }
  body { font-family: var(--sans); font-size: 13px; line-height: 1.5; margin: 0; width: 300px; padding: 16px; color: var(--text); background: var(--bg-deep); }
  .head { display: flex; align-items: center; justify-content: space-between; margin: 0 0 14px; }
  .wordmark { font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-shadow: 0 0 8px rgba(34, 211, 238, 0.55), 0 0 16px rgba(34, 211, 238, 0.25); }
  .health { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); transition: background 0.2s, box-shadow 0.2s; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .dot.checking { background: var(--warn); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .url { color: var(--text-faint); font-family: var(--mono); font-size: 10px; margin-bottom: 12px; word-break: break-all; max-height: 26px; overflow: hidden; line-height: 1.3; }
  button { width: 100%; padding: 11px; font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 0.05em; background: var(--accent); color: var(--bg-deep); border: 0; border-radius: 6px; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; }
  button:hover:not(:disabled) { background: var(--accent-glow); box-shadow: 0 0 14px rgba(34, 211, 238, 0.4); }
  button:disabled { background: var(--bg-elev); color: var(--text-faint); cursor: not-allowed; }
  .status { margin-top: 12px; font-size: 12px; min-height: 16px; font-family: var(--mono); }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--danger); }
  .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .link { font-family: var(--mono); font-size: 11px; color: var(--accent); text-decoration: none; }
  .link:hover { color: var(--accent-glow); text-decoration: underline; }
  .hint { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
<div class="head">
  <span class="wordmark">JOBFLOW</span>
  <div class="health"><span class="dot checking" id="dot"></span><span id="health-label">checking…</span></div>
</div>
<div class="url" id="url">Loading…</div>
<button id="save" disabled>Queue Job</button>
<div class="status" id="status"></div>
<div class="footer">
  <a class="link" href="http://localhost:3737/" target="_blank">Open dashboard →</a>
  <span class="hint">:3737</span>
</div>
<script src="popup.js"></script>
</body>
</html>
